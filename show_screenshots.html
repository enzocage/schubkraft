<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: sans-serif; background: #222; color: #fff; margin: 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
  .card { border: 1px solid #444; padding: 10px; background: #333; text-align: center; }
  img { max-width: 100%; height: auto; border: 1px solid #555; }
</style>
</head>
<body>
  <h1>Screenshots</h1>
  <div class="grid">
    <div class="card"><h3>Screenshot (16).png</h3><img src="gfx/Screenshot (16).png"></div>
    <div class="card"><h3>Screenshot (18).png</h3><img src="gfx/Screenshot (18).png"></div>
    <div class="card"><h3>Screenshot (19).png</h3><img src="gfx/Screenshot (19).png"></div>
    <div class="card"><h3>Screenshot (20).png</h3><img src="gfx/Screenshot (20).png"></div>
    <div class="card"><h3>Screenshot (21).png</h3><img src="gfx/Screenshot (21).png"></div>
    <div class="card"><h3>Screenshot (22).png</h3><img src="gfx/Screenshot (22).png"></div>
    <div class="card"><h3>Screenshot (23).png</h3><img src="gfx/Screenshot (23).png"></div>
    <div class="card"><h3>Screenshot (24).png</h3><img src="gfx/Screenshot (24).png"></div>
    <div class="card"><h3>Schubkraft.png</h3><img src="gfx/Schubkraft.png"></div>
  </div>
</body>
</html>
