<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: sans-serif; background: #222; color: #fff; margin: 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
  .card { border: 1px solid #444; padding: 10px; background: #333; text-align: center; }
  img { max-width: 100%; height: auto; border: 1px solid #555; }
</style>
</head>
<body>
  <h1>Screenshots</h1>
  <div class="grid">
    <div class="card"><h3>Screenshot (25).png</h3><img src="gfx/Screenshot (25).png"></div>
    <div class="card"><h3>Screenshot (26).png</h3><img src="gfx/Screenshot (26).png"></div>
    <div class="card"><h3>Screenshot (27).png</h3><img src="gfx/Screenshot (27).png"></div>
    <div class="card"><h3>Screenshot (28).png</h3><img src="gfx/Screenshot (28).png"></div>
    <div class="card"><h3>Screenshot (29).png</h3><img src="gfx/Screenshot (29).png"></div>
    <div class="card"><h3>Screenshot (30).png</h3><img src="gfx/Screenshot (30).png"></div>
    <div class="card"><h3>Schubkraft.png</h3><img src="gfx/Schubkraft.png"></div>
  </div>
</body>
</html>
